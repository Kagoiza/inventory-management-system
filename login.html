<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="left-section">
        <div class="login-container">
            <h1 class="login-title">Login</h1>
            <p class="login-subtitle">See your growth and get support!</p>
            
            <form>
                <div class="form-group">
                    <label for="email">Email*</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password*</label>
                    <input type="password" id="password" placeholder="Minimum of 8 characters">
                </div>
                
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forget password?</a>
                </div>
                
                <button type="submit" class="login-button">Login</button>
            </form>
            
            <p class="register-link">Not registered yet? <a href="#">Create a new account</a></p>
        </div>
    </div>
    
    <div class="right-section">
        <div class="logo-container">
            <img src="icta logo.png" alt="Company Logo" class="company-logo">
        </div>
    </div>
</body>
</html>
